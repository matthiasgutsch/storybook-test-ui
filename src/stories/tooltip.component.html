<div
  class="tooltip"
  [class]="'tooltip tooltip--' + arrowSide.toLowerCase()"
  [style.background-color]="bgColor"
>
  <!-- Content -->
  <div class="tooltip__content">
    @if (showSmallLabel && smallLabel) {
      <span class="tooltip__small-label">{{ smallLabel }}</span>
    }
    @if (showHeading && heading) {
      <span class="tooltip__heading">{{ heading }}</span>
    }
    @if (showMessage && message) {
      <span class="tooltip__message">{{ message }}</span>
    }
  </div>

  <!-- Arrow — absolutely positioned, color inherits from parent via currentColor trick -->
  <span class="tooltip__arrow" [style.background-color]="bgColor"></span>
</div>
