<div class="swatch"
  [class.swatch--filled]="mode === 'filled'"
  [class.swatch--empty]="mode === 'empty'">

  @if (mode === 'filled') {
    <div class="swatch__fill" [style.background-color]="color">
      @if (labelLeft) {
        <div class="swatch__tag swatch__tag--left">
          <span class="swatch__tag-text">{{ labelLeftText }}</span>
        </div>
      }
      @if (labelRight) {
        <div class="swatch__tag swatch__tag--right">
          <span class="swatch__tag-text">{{ labelRightText }}</span>
        </div>
      }
    </div>
  }

  @if (mode === 'empty') {
    <div class="swatch__pattern">
      <div class="swatch__icon">
        <!-- eye-slash icon masked in #97999b -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 1 12 1 12a18.45 18.45 0 0 1 5.06-5.94" stroke="#97999b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="#97999b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" stroke="#97999b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="1" y1="1" x2="23" y2="23" stroke="#97999b" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    @if (labelLeft) {
      <div class="swatch__tag swatch__tag--left">
        <span class="swatch__tag-text">{{ labelLeftText }}</span>
      </div>
    }
    @if (labelRight) {
      <div class="swatch__tag swatch__tag--right">
        <span class="swatch__tag-text">{{ labelRightText }}</span>
      </div>
    }
  }

</div>
