<button
  class="btn"
  [class]="'btn btn--' + type.toLowerCase() + ' btn--' + size.toLowerCase()"
  [disabled]="disabled"
  (click)="clicked.emit()"
>
  @if (showLeadingIcon) {
    <span class="btn__icon btn__icon--left" aria-hidden="true">
      <svg
        width="20"
        height="20"
        viewBox="0 0 20 20"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M3 14.75V17h2.25L15.75 6.5l-2.25-2.25L3 14.75Z"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M12.75 5.25 15 7.5"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </span>
  }

  @if (showLabel) {
    <span class="btn__label">{{ label }}</span>
  }

  @if (rightIcon) {
    <span class="btn__icon btn__icon--right" aria-hidden="true">
      <svg
        width="20"
        height="20"
        viewBox="0 0 20 20"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M3 14.75V17h2.25L15.75 6.5l-2.25-2.25L3 14.75Z"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M12.75 5.25 15 7.5"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </span>
  }
</button>
