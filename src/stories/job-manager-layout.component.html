<div class="jm">

  <!-- ── Title Bar ── -->
  <header class="jm__titlebar">
    <button class="jm__back-btn">
      <img [src]="icons.chevronLeft" alt="back" class="jm__back-icon" />
      <span class="jm__back-label">Summary</span>
    </button>

    <h1 class="jm__job-title">{{ jobTitle }}</h1>

    <button class="jm__action-btn" disabled>Calculate recipe</button>
  </header>

  <!-- ── Content Row ── -->
  <div class="jm__content">

    <!-- Left Sidebar -->
    <aside class="jm__sidebar">
      @for (tab of leftTabs; track tab.id) {
        <button
          class="jm__vtab"
          [class.jm__vtab--active]="activeTab === tab.id"
          (click)="setTab(tab.id)"
        >
          <span class="jm__vtab-swatch" [style.background-color]="tab.color">
            @if (tab.icon) {
              <img [src]="tab.icon" alt="" class="jm__vtab-swatch-icon" />
            }
          </span>
          <span class="jm__vtab-text">
            <strong class="jm__vtab-label">{{ tab.label }}</strong>
            @if (tab.subtitle) {
              <span class="jm__vtab-subtitle">{{ tab.subtitle }}</span>
            }
          </span>
        </button>
      }
    </aside>

    <!-- Info Panel -->
    <section class="jm__info-panel">
      <h2 class="jm__info-heading">Standard</h2>
      <div class="jm__color-swatch">
        <img [src]="icons.swatchIcon" alt="No preview" class="jm__swatch-icon" />
      </div>
    </section>

    <!-- Manual Input Form -->
    <main class="jm__main">
      <h2 class="jm__main-heading">Manual Input</h2>

      <div class="jm__field">
        <label class="jm__label">
          Standard Name
          <span class="jm__help">Help text</span>
        </label>
        <input class="jm__input" type="text" placeholder="Type a name..." />
      </div>

      <div class="jm__field">
        <label class="jm__label">
          Illuminant
          <span class="jm__help">Help text</span>
        </label>
        <div class="jm__select-wrap">
          <input class="jm__input jm__input--select" type="text" placeholder="Choose..." readonly />
          <span class="jm__caret">&#8964;</span>
        </div>
      </div>

      <!-- LAB / LCH Toggle -->
      <div class="jm__color-section">
        <div class="jm__toggle">
          <button
            class="jm__toggle-btn"
            [class.jm__toggle-btn--active]="colorMode === 'LAB'"
            (click)="setColorMode('LAB')"
          >LAB</button>
          <button
            class="jm__toggle-btn"
            [class.jm__toggle-btn--active]="colorMode === 'LCH'"
            (click)="setColorMode('LCH')"
          >LCH</button>
        </div>

        <div class="jm__color-inputs">
          @if (colorMode === 'LAB') {
            <div class="jm__field jm__field--inline">
              <label class="jm__label">L*</label>
              <input class="jm__input" type="number" />
            </div>
            <div class="jm__field jm__field--inline">
              <label class="jm__label">a*</label>
              <input class="jm__input" type="number" />
            </div>
            <div class="jm__field jm__field--inline">
              <label class="jm__label">b*</label>
              <input class="jm__input" type="number" />
            </div>
          }
          @if (colorMode === 'LCH') {
            <div class="jm__field jm__field--inline">
              <label class="jm__label">L*</label>
              <input class="jm__input" type="number" />
            </div>
            <div class="jm__field jm__field--inline">
              <label class="jm__label">C*</label>
              <input class="jm__input" type="number" />
            </div>
            <div class="jm__field jm__field--inline">
              <label class="jm__label">h°</label>
              <input class="jm__input" type="number" />
            </div>
          }
        </div>
      </div>

      <button class="jm__save-btn" disabled>Save Standard</button>
    </main>

    <!-- Right Tab Rail -->
    <nav class="jm__tabs-right">
      @for (tab of rightTabs; track tab.id) {
        <button
          class="jm__rtab"
          [class.jm__rtab--active]="activeRightTab === tab.id"
          (click)="setRightTab(tab.id)"
        >
          <img [src]="tab.icon" alt="" class="jm__rtab-icon" />
          <span class="jm__rtab-label">{{ tab.label }}</span>
        </button>
      }
    </nav>

  </div>
</div>
